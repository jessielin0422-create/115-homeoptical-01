<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業無紙化驗光與配鏡系統</title>
    <style>
        * { box-sizing: border-box; font-family: "Microsoft JhengHei", sans-serif; }
        body { background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 950px; margin: 0 auto; }
        .record-card { background: #ffffff; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .status-bar { background: #e9ecef; padding: 15px; text-align: center; font-weight: bold; color: #495057; border-bottom: 2px solid #dee2e6; }
        .card-section { padding: 20px 30px; }
        h3 { color: #007bff; border-left: 5px solid #007bff; padding-left: 10px; margin-bottom: 20px; }
        h4 { margin: 10px 0; color: #555; text-align: center; }
        .row { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 15px; }
        .col-25 { flex: 1; min-width: 200px; }
        .col-50 { flex: 1; min-width: 300px; }
        
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; font-size: 0.9em; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 6px; }
        .eye-box { background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #e9ecef; }
        .data-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 10px; align-items: center; }
        
        /* 選項群組樣式 */
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 15px; background: #fff; padding: 10px; border-radius: 6px; border: 1px solid #eee; }
        .checkbox-item { display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .checkbox-item input { width: auto; cursor: pointer; }

        .button-group { padding: 0 30px 30px; display: flex; gap: 15px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1em; }
        .save-btn { background: #28a745; color: white; }
        .search-btn { background: #007bff; color: white; }

        .history-list { padding: 30px; background: #fafafa; border-top: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: center; font-size: 0.85em; }
        th { background: #f1f3f5; }

        .bg-danger { background-color: #f8d7da !important; color: #721c24 !important; }
        .bg-warning { background-color: #fff3cd !important; color: #856404 !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="record-card">
        <div id="status-bar" class="status-bar">請輸入電話查詢客戶資料</div>

        <div class="card-section">
            <h3>客戶與配戴習慣</h3>
            <div class="row">
                <div class="col-25"><label>客戶編號</label><input type="text" id="custID" readonly style="background:#f1f3f5"></div>
                <div class="col-25"><label>姓名</label><input type="text" id="custName"></div>
                <div class="col-25"><label>電話</label><input type="tel" id="custPhone"></div>
                <div class="col-25">
                    <label>隱形眼鏡習慣</label>
                    <select id="cl_habit">
                        <option value="none">不戴隱眼</option>
                        <option value="daily">日拋 (偶爾)</option>
                        <option value="frequent">長戴型 (每天)</option>
                        <option value="night">硬式/角膜塑型</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-50">
                    <label>隱眼詳細描述 (如：品牌、每日配戴時數)</label>
                    <input type="text" placeholder="例：酷柏日拋，每天 8-10 小時">
                </div>
            </div>
        </div>

        <hr>

        <div class="card-section">
            <h3>驗光數據 (Refraction)</h3>
            <div class="row">
                <div class="col-50 eye-box">
                    <h4>右眼 (OD)</h4>
                    <div class="data-grid">
                        <span>SPH</span><input type="number" step="0.25">
                        <span>CYL</span><input type="number" step="0.25">
                        <span>AXIS</span><input type="number">
                    </div>
                </div>
                <div class="col-50 eye-box">
                    <h4>左眼 (OS)</h4>
                    <div class="data-grid">
                        <span>SPH</span><input type="number" step="0.25">
                        <span>CYL</span><input type="number" step="0.25">
                        <span>AXIS</span><input type="number">
                    </div>
                </div>
            </div>
        </div>

        <hr>

        <div class="card-section">
            <h3>本次處理結果 (Disposition)</h3>
            <label>是否有配鏡 / 更新紀錄</label>
            <div class="checkbox-group">
                <label class="checkbox-item"><input type="checkbox"> 換新鏡架 (Frame)</label>
                <label class="checkbox-item"><input type="checkbox"> 換新鏡片 (Lens)</label>
                <label class="checkbox-item"><input type="checkbox"> 購買隱形眼鏡 (CL)</label>
                <label class="checkbox-item"><input type="checkbox"> 純驗光紀錄</label>
            </div>
            <div style="margin-top:15px;">
                <label>處置備註 (鏡片型號或特殊需求)</label>
                <textarea rows="2" placeholder="例：更換蔡司數位鏡片、鏡架維修等..."></textarea>
            </div>
        </div>

        <div class="button-group">
            <button class="btn search-btn" onclick="searchCustomer()">查詢客戶紀錄</button>
            <button class="btn save-btn">儲存並建立紀錄</button>
        </div>

        <div class="history-list">
            <h3>歷史紀錄表</h3>
            <table>
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>右眼 (S/C/A)</th>
                        <th>左眼 (S/C/A)</th>
                        <th>配鏡紀錄</th>
                        <th>配戴習慣</th>
                    </tr>
                </thead>
                <tbody id="historyTableBody">
                    <tr><td colspan="5" style="color:#999">輸入電話搜尋歷史資料</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
