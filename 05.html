<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>視光師數據分析工作站</title>
    <style>
        :root {
            --sidebar-width: 350px;
            --primary-color: #0984e3;
            --bg-gray: #f8f9fa;
        }

        * { box-sizing: border-box; font-family: "Microsoft JhengHei", sans-serif; }
        body { background-color: var(--bg-gray); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* 左側固定欄 */
        .sidebar {
            width: var(--sidebar-width);
            background: #ffffff;
            border-right: 1px solid #dcdde1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        /* 右側表單容器 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .top-header {
            padding: 10px 20px;
            background: #fff;
            border-bottom: 1px solid #eee;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 讓 iframe 填滿剩餘空間 */
        .iframe-box {
            flex: 1;
            width: 100%;
            height: 100%;
            border: none;
            position: relative;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 左側資訊卡片 */
        .info-card {
            background: #f1f3f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .label { font-size: 0.8em; color: #666; font-weight: bold; }
        .value { font-size: 1.1em; color: #333; font-weight: bold; margin-top: 5px; }

        .btn-reload {
            padding: 6px 12px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h3 style="color:var(--primary-color); margin-top:0;">👤 視光工作站</h3>
        
        <div class="info-card">
            <span class="label">當前作業客戶</span>
            <div class="value">陳大明</div>
        </div>

        <div class="info-card">
            <span class="label">家族成員連動</span>
            <div style="font-size: 0.9em; color: #6c5ce7; margin-top: 5px;">
                • 林美玲 (配偶)<br>
                • 陳小華 (子女)
            </div>
        </div>

        <div style="margin-top: auto; font-size: 12px; color: #999; line-height: 1.6;">
            <strong>進貨分析：</strong><br>
            系統會將右側表單數據存入 Google 試算表。請定期查看試算表中的「品牌佔有率」以優化庫存。
        </div>
    </aside>

    <main class="main-content">
        <div class="top-header">
            <span>📋 數據輸入與紀錄</span>
            <button class="btn-reload" onclick="reloadIframe()">重新整理表單</button>
        </div>
        <div class="iframe-box">
            <iframe 
                id="form-iframe"
                src="https://docs.google.com/forms/d/e/1FAIpQLSfAcKAjZqDa70ZBtL--0gp7Huuv2CRQ0ao6zwcIVcebnihB-w/viewform?embedded=true" 
                frameborder="0" 
                marginheight="0" 
                marginwidth="0">
                載入中…
            </iframe>
        </div>
    </main>

    <script>
        function reloadIframe() {
            var iframe = document.getElementById('form-iframe');
            iframe.src = iframe.src;
        }
    </script>

</body>
</html>
