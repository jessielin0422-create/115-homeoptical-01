<!DOCTYPE html>
<html lang="zh-TW">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>圖片連結定位練習</title>
     <style>
          .container {
               width: 80%;
               height: 25vh;
               background-color: #F8F6F2; /* 換成溫和的米色底 */
               margin: auto;
               margin-top: 20px;
               padding: 5px;

               /* flex最重要的三個步驟 */
               display: flex;
               justify-content: space-between;
               align-items: center;
               gap: 20px;
          }

          /* 🌟 核心修正：將所有圖片連結（按鈕）設為絕對定位 */
          .img-link {
               position: absolute;  /* 👈 變成特務，脫離排隊隊伍 */
               top: 15px;           /* 鎖定距離頂部 15px */
               right: 15px;         /* 鎖定距離右邊 15px，不管螢幕怎麼變都不會跑掉 */
               
               width: 45px;         /* 設定圖片按鈕的寬度 */
               height: 45px;        /* 設定圖片按鈕的高度 */
               
               /* 做一個漂亮的圓角白底，讓圖示像實體按鈕一樣浮起來 */
               background-color: white;
               border-radius: 10px;
               box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
               
               /* 讓裡面的圖片乖乖置中 */
               display: flex;
               justify-content: center;
               align-items: center;
               transition: 0.2s;
          }

          /* 滑鼠游標移過去時，按鈕會微微放大，增加點擊感 */
          .img-link:hover {
               transform: scale(1.1);
          }

          /* 讓裡面的圖片檔案完美填滿 */
          .img-link img {
               width: 25px;
               height: 25px;
          }

          /* ========== 所有的格子（爸爸們）通通加上相對定位 ========== */
          /* 1 號排（4格） */
          .item11, .item12, .item13, .item14 {
               position: relative; /* 🌟 設下隱形圍牆，讓絕對定位的圖片連結找得到靠山 */
               width: 25.5%; height: 100%; border-radius: 16px;
          }
          .item11 { background-color: rgb(247, 8, 8); }
          .item12 { background-color: rgb(244, 191, 191); }
          .item13 { background-color: rgb(244, 111, 111); }
          .item14 { background-color: rgb(236, 60, 60); }

          /* 2 號排（6格） */
          .item21, .item22, .item23, .item24, .item25, .item26 {
               position: relative; /* 🌟 一樣設下隱形圍牆 */
               width: 16.665%; height: 100%; border-radius: 16px;
          }
          .item21 { background-color: rgb(249, 138, 3); }
          .item22 { background-color: rgb(244, 237, 227); }
          .item23 { background-color: rgb(244, 151, 38); }
          .item24 { background-color: rgb(248, 218, 173); }
          .item25 { background-color: rgb(246, 169, 76); }
          .item26 { background-color: rgb(242, 201, 140); }
     </style>
</head>

<body>

     <div class="container container-1">
          <div class="item11">
               <a class="img-link" href="https://mackliu.github.io/php-book/">
                    <img src="https://img.icons8.com/m_rounded/50/737373/save.png" alt="save">
               </a>
          </div>
          
          <div class="item12">
               <a class="img-link" href="https://mackliu.github.io/php-book/">
                    <img src="https://img.icons8.com/m_rounded/50/737373/save.png" alt="save">
               </a>
          </div>
          
          <div class="item13"></div>
          <div class="item14"></div>
     </div>

     <div class="container container-2">
          <div class="item21">
               <a class="img-link" href="https://mackliu.github.io/php-book/">
                    <img src="https://img.icons8.com/m_rounded/50/737373/save.png" alt="save">
               </a>
          </div>
          <div class="item22"></div>
          <div class="item23"></div>
          <div class="item24"></div>
          <div class="item25"></div>
          <div class="item26"></div>
     </div>

</body>

</html>
